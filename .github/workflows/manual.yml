name: Manual Scraper

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Optional date tag for the run (YYYY-MM-DD)'
        default: 'manual'
        required: false
        type: string

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          echo "Running scraper for input date: ${{ inputs.run_date }}"
          python main.py

      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        with:
          name: dse-data-${{ inputs.run_date }}
          path: Export_Data/*.xlsx
