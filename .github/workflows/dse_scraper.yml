name: DSE Scraper

on:
  schedule:
    # Run at 8 PM Dhaka time (14:00 UTC), only Sunday–Thursday
    - cron: "0 14 * * 0-4"
  workflow_dispatch: # allows manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pandas openpyxl

      - name: Run scraper
        run: python main.py

      - name: Upload Excel output
        uses: actions/upload-artifact@v3
        with:
          name: dse-data
          path: Export_Data/*.xlsx
