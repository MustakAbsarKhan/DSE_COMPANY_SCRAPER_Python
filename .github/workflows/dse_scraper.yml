name: DSE Scraper

on:
  schedule:
    - cron: "20 14 * * 0-4"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # opt into Node.js 24 globally

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        with:
          name: dse-data
          path: Export_Data/*.xlsx
